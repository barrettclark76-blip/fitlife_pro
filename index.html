<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>75 Day Challenge</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --accent: #6366f1;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #e2e8f0;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      color: var(--text);
      padding: 16px;
    }

    .container {
      max-width: 720px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }

    .progressRing {
      width: 150px;
      margin: auto;
      display: block;
    }

    .progressText {
      text-align: center;
      font-size: 20px;
      margin-top: -105px;
      font-weight: bold;
    }

    .checklist label {
      display: flex;
      align-items: center;
      margin: 12px 0;
      font-size: 17px;
    }

    .checklist input {
      margin-right: 12px;
      transform: scale(1.3);
    }

    input[type=file] {
      width: 100%;
      margin-top: 8px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .day {
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 11px;
      padding: 4px;
      min-height: 70px;
      background: var(--card);
      cursor: pointer;
    }

    .day.complete {
      background: #22c55e33;
      border-color: #22c55e;
    }

    .day img {
      width: 100%;
      height: 38px;
      object-fit: cover;
      border-radius: 4px;
      margin-top: 3px;
    }

    .analytics {
      display: flex;
      justify-content: space-around;
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
    }

    .stat {
      font-weight: bold;
      font-size: 18px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>75 Day Challenge</h1>
    
    <div class="card" style="padding-bottom: 40px;">
      <svg class="progressRing" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" stroke="#e5e7eb" stroke-width="10" fill="none"/>
        <circle id="ring" cx="60" cy="60" r="50" stroke="var(--accent)" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="314"/>
      </svg>
      <div class="progressText" id="dayLabel">Day 1</div>
    </div>

    <div class="card">
      <h3>Daily Tasks</h3>
      <div class="checklist">
        <label><input type="checkbox" id="diet"> Maintained Diet</label>
        <label><input type="checkbox" id="water"> 128oz Water</label>
        <label><input type="checkbox" id="exercise"> Exercised</label>
        <label><input type="checkbox" id="word"> Time in the Word</label>
        <label><input type="checkbox" id="photoCheck"> Uploaded Progress Photo</label>
      </div>
      <input type="file" accept="image/*" id="photoUpload">
    </div>

    <div class="card">
      <h3>Stats</h3>
      <div class="analytics">
        <div><div class="stat" id="completedDays">0</div>Completed</div>
        <div><div class="stat" id="streak">0</div>Streak</div>
        <div><div class="stat">75</div>Goal</div>
      </div>
    </div>

    <div class="card">
      <h3>Calendar</h3>
      <div class="calendar" id="calendar"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <img id="modalImg">
  </div>

  <script src="app.js"></script>
</body>
</html>
