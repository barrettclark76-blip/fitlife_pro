<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>75 Day Challenge</title>

<style>

:root{
--accent:#6366f1;
--bg:#f5f7fb;
--card:#ffffff;
--text:#1f2937;
}

@media (prefers-color-scheme:dark){

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#e2e8f0;
}

}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:var(--text);
padding:16px;
}

.container{
max-width:720px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:10px;
}

.card{
background:var(--card);
border-radius:16px;
padding:18px;
margin-bottom:15px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

.progressRing{
width:150px;
margin:auto;
display:block;
}

.progressText{
text-align:center;
font-size:20px;
margin-top:-105px;
font-weight:bold;
}

.checklist label{
display:flex;
align-items:center;
margin:12px 0;
font-size:17px;
}

.checklist input{
margin-right:12px;
transform:scale(1.3);
}

input[type=file]{
width:100%;
margin-top:8px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:10px;
}

.day{
border-radius:8px;
border:1px solid #e2e8f0;
font-size:11px;
padding:4px;
min-height:70px;
background:var(--card);
}

.day.complete{
background:#22c55e33;
border-color:#22c55e;
}

.day img{
width:100%;
height:38px;
object-fit:cover;
border-radius:4px;
margin-top:3px;
}

.analytics{
display:flex;
justify-content:space-around;
text-align:center;
font-size:14px;
margin-top:10px;
}

.stat{
font-weight:bold;
font-size:18px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

.modal img{
max-width:90%;
max-height:80%;
border-radius:12px;
}

</style>

</head>

<body>

<div class="container">

<h1>75 Day Challenge</h1>

<div class="card">

<svg class="progressRing" viewBox="0 0 120 120">

<circle cx="60" cy="60" r="50" stroke="#e5e7eb" stroke-width="10" fill="none"/>

<circle id="ring"
cx="60" cy="60" r="50"
stroke="var(--accent)"
stroke-width="10"
fill="none"
stroke-linecap="round"
stroke-dasharray="314"
stroke-dashoffset="314"/>

</svg>

<div class="progressText" id="dayLabel"></div>

</div>

<div class="card">

<h3>Daily Tasks</h3>

<div class="checklist">

<label><input type="checkbox" id="diet"> Maintained Diet</label>
<label><input type="checkbox" id="water"> 128oz Water</label>
<label><input type="checkbox" id="exercise"> Exercised</label>
<label><input type="checkbox" id="word"> Time in the Word</label>
<label><input type="checkbox" id="photoCheck"> Uploaded Progress Photo</label>

</div>

<input type="file" accept="image/*" id="photoUpload">

</div>

<div class="card">

<h3>Stats</h3>

<div class="analytics">

<div>
<div class="stat" id="completedDays">0</div>
Completed
</div>

<div>
<div class="stat" id="streak">0</div>
Streak
</div>

<div>
<div class="stat">75</div>
Goal
</div>

</div>

</div>

<div class="card">

<h3>Calendar</h3>

<div class="calendar" id="calendar"></div>

</div>

</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>

const START=new Date("2026-03-16")
const TOTAL=75

let data=JSON.parse(localStorage.getItem("challenge"))||{}

function dayNumber(date){

return Math.floor((date-START)/(1000*60*60*24))+1

}

let today=new Date()

let day=dayNumber(today)

if(day<1) day=1
if(day>TOTAL) day=TOTAL

dayLabel.innerText="Day "+day

function save(){

localStorage.setItem("challenge",JSON.stringify(data))

renderCalendar()
updateStats()

}

function updateToday(){

if(!data[day]) data[day]={}

data[day].diet=diet.checked
data[day].water=water.checked
data[day].exercise=exercise.checked
data[day].word=word.checked
data[day].photoCheck=photoCheck.checked

save()

}

document.querySelectorAll("input[type=checkbox]").forEach(c=>{

c.addEventListener("change",updateToday)

})

photoUpload.addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(){

if(!data[day]) data[day]={}

data[day].photo=reader.result
data[day].photoCheck=true

save()

}

reader.readAsDataURL(file)

})

function renderCalendar(){

calendar.innerHTML=""

for(let i=1;i<=TOTAL;i++){

let d=data[i]||{}

let div=document.createElement("div")

div.className="day"

let date=new Date(START)

date.setDate(START.getDate()+i-1)

div.innerHTML=date.getDate()

let complete=d.diet && d.water && d.exercise && d.word && d.photoCheck

if(complete) div.classList.add("complete")

if(d.photo){

let img=document.createElement("img")
img.src=d.photo

div.appendChild(img)

div.onclick=()=>{
modalImg.src=d.photo
modal.style.display="flex"
}

}

calendar.appendChild(div)

}

}

modal.onclick=()=>modal.style.display="none"

function updateStats(){

let completed=0
let streak=0

for(let i=1;i<=TOTAL;i++){

let d=data[i]

let done=d && d.diet && d.water && d.exercise && d.word && d.photoCheck

if(done){
completed++
streak++
}else{
streak=0
}

}

completedDays.innerText=completed
document.getElementById("streak").innerText=streak

let percent=completed/TOTAL

let circumference=314

ring.style.strokeDashoffset=circumference-(percent*circumference)

}

renderCalendar()
updateStats()

</script>

</body>
</html>
